<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Death Note Archive</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Metal+Mania&family=Kaisei+Tokumin:wght@400;700&family=Song+Myung&display=swap');

    body {
      font-family: 'Kaisei Tokumin', 'Song Myung', serif;
      background-color: #0a0a0a;
      color: #f0f0f0;
    }

    ::selection {
      background-color: #9b0000;
      color: white;
    }

    /* 로딩 애니메이션 및 전환 효과 */
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body class="min-h-screen pb-20">

  <div class="sticky top-0 z-50 flex flex-col shadow-2xl">
    <header
      class="bg-[#0a0a0a]/95 backdrop-blur-md border-b-2 border-[#9b0000]/50 px-4 py-3 flex flex-col md:flex-row md:items-center justify-between gap-3 md:gap-4">

      <div class="flex items-center justify-between w-full md:w-auto">
        <h1 class="text-xl md:text-2xl font-bold cursor-pointer tracking-tighter"
          style="font-family: 'Metal Mania', cursive;" onclick="app.goHome()">
          DEATH NOTE <span class="text-[#9b0000] italic">ARCHIVE</span>
        </h1>
      </div>

      <div class="flex flex-wrap items-center gap-2 w-full md:w-auto justify-start sm:justify-end">

        <div class="flex items-center bg-[#1a1a1a] p-1 rounded border border-[#333] gap-1 shrink-0">
          <button id="btn-lang-ko" onclick="app.setLanguage('ko')"
            class="px-2.5 py-1 text-xs font-bold rounded transition-all">KO</button>
          <button id="btn-lang-ja" onclick="app.setLanguage('ja')"
            class="px-2.5 py-1 text-xs font-bold rounded transition-all">JA</button>
        </div>

        <div class="flex items-center gap-1.5 bg-[#1a1a1a] px-3 py-2 rounded border border-[#333] shrink-0">
          <i data-lucide="filter" class="w-3.5 h-3.5 text-[#9b0000]"></i>
          <select id="sort-select" onchange="app.setSortOrder(this.value)"
            class="bg-transparent text-xs md:text-sm font-bold text-[#aaa] outline-none cursor-pointer">
          </select>
        </div>

        <div class="flex bg-[#1a1a1a] p-1 rounded border border-[#333] gap-1 shrink-0" id="view-mode-buttons">
          <button id="btn-year" class="px-4 md:px-5 py-1.5 text-xs md:text-sm font-bold rounded transition-all"
            onclick="app.setViewMode('year')">YEAR</button>
          <button id="btn-creator" class="px-4 md:px-5 py-1.5 text-xs md:text-sm font-bold rounded transition-all"
            onclick="app.setViewMode('creator')">CREATOR</button>
          <button id="btn-all" class="px-4 md:px-5 py-1.5 text-xs md:text-sm font-bold rounded transition-all"
            onclick="app.setViewMode('all')">ALL</button>
        </div>

        <button onclick="app.fetchData()"
          class="p-2.5 bg-[#9b0000] rounded hover:bg-[#bf0000] transition-colors shrink-0 sm:order-last">
          <i data-lucide="rotate-cw" id="reload-icon" class="w-4 h-4"></i>
        </button>

        <div class="relative flex-grow sm:flex-grow-0 w-full sm:w-auto order-last sm:order-none mt-1 sm:mt-0">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-[#555]"></i>
          <input type="text" id="search-input" placeholder="Search..." oninput="app.setSearchQuery(this.value)"
            class="bg-[#1a1a1a] border border-[#333] text-xs md:text-sm px-9 py-2 rounded w-full sm:w-36 md:w-52 outline-none font-sans focus:border-[#9b0000] transition-colors" />
        </div>

      </div>
    </header>
  </div>

  <main id="main-content" class="max-w-7xl mx-auto p-6"></main>

  <footer
    class="mt-20 py-10 text-center opacity-20 text-[9px] font-bold tracking-[0.4em] uppercase pointer-events-none">
    Death Note Archive Project
  </footer>

  <!-- 크리에이터 작품 목록 모달 레이아웃 추가 -->
  <div id="creator-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm p-4 fade-in">
    <div class="bg-[#121212] border-2 border-[#9b0000]/50 w-full max-w-7xl max-h-[85vh] flex flex-col rounded shadow-2xl overflow-hidden">
      <div class="p-4 border-b border-[#222] flex items-center justify-between bg-[#0a0a0a]">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full overflow-hidden border border-[#9b0000]/40 bg-[#0a0a0a]">
            <img id="modal-creator-profile" src="" class="w-full h-full object-cover" />
          </div>
          <div>
            <h3 id="modal-creator-name" class="text-xl font-bold text-[#9b0000] italic"></h3>
            <p id="modal-creator-count" class="text-[10px] text-[#555] font-sans uppercase tracking-widest"></p>
          </div>
        </div>
        <button onclick="app.closeCreatorModal()" class="p-2 bg-[#1a1a1a] border border-[#333] hover:border-[#9b0000] text-[#888] hover:text-white transition-colors rounded">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <div class="p-6 overflow-y-auto flex-grow min-h-0">
        <div id="modal-creator-works" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- 다국어 리소스 설정 ---
    const i18n = {
      ko: {
        sortLatest: "최신순",
        sortOldest: "오래된순",
        sortRandom: "랜덤순",
        sortName: "이름순",
        viewYear: "YEAR",
        viewCreator: "CREATOR",
        viewAll: "ALL",
        searchPlaceholder: "검색...",
        loading: "데이터를 불러오는 중...",
        viewable: "시청 가능",
        notViewable: "시청 불가",
        playFail: "재생이 안 될 경우",
        sortedBy: "정렬됨",
        works: "개 작품",
        back: "뒤로 가기"
      },
      ja: {
        sortLatest: "新しい順",
        sortOldest: "古い順",
        sortRandom: "ランダム",
        sortName: "名前順",
        viewYear: "YEAR",
        viewCreator: "CREATOR",
        viewAll: "ALL",
        searchPlaceholder: "検索...",
        loading: "ARCHIVE LOADING...",
        viewable: "視聴可能",
        notViewable: "視聴不可",
        playFail: "再生できない時",
        sortedBy: "整列済み",
        works: "作品",
        back: "戻る"
      }
    };

    // --- Application Logic ---
    const app = (function () {
      const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBYQPZbTcfQdojK2eff3UYlHjF-b2o8LlUHUWRgVfKAXR7Rv8U5xOpetZtrqUMaEjy3g/exec";
      const DEFAULT_PROFILE = "https://lh3.googleusercontent.com/d/1fsQCiwKwK-j-Qlcw6hFwlzqHmCtGs90F";

      let state = {
        loading: true,
        rawData: { videoData: [], creatorMap: {}, profileMap: {}, translationMap: {} },
        viewMode: 'year',
        searchQuery: '',
        selectedPlaylist: null,
        activePlayers: {},
        sortOrder: 'latest',
        lang: 'ko',
        mainScrollPosition: 0,
        randomWeights: {}
      };

      // 유틸리티 함수
      const escapeHTML = (str) => {
        if (!str) return '';
        return str.replace(/[&<>'"]/g,
          tag => ({ '&': '&', '<': '<', '>': '>', "'": "'", '"': '"' }[tag] || tag)
        );
      };

      const cleanStr = (str, removeNumbers = false) => {
        if (!str) return '';
        const regex = removeNumbers ? /[^\p{L}]/gu : /[^\p{L}\p{N}]/gu;
        return str.toLowerCase().replace(regex, '');
      };

      const matchSearch = (target, query) => {
        if (!query) return true;
        if (!target) return false;

        const t1 = cleanStr(target, false);
        const q1 = cleanStr(query, false);
        if (q1 && t1.includes(q1)) return true;

        const t2 = cleanStr(target, true);
        const q2 = cleanStr(query, true);
        if (q2 && t2.includes(q2)) return true;

        return false;
      };

      const getRandomWeight = (key) => {
        if (!state.randomWeights) state.randomWeights = {};
        if (state.randomWeights[key] === undefined) {
          state.randomWeights[key] = Math.random();
        }
        return state.randomWeights[key];
      };

      const extractYtId = (url) => {
        if (!url) return null;
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=))([^#\&\?]*)/);
        return (match && match[1].length === 11) ? match[1] : null;
      };

      const getThumbnail = (video) => {
        if (!video) return '';
        const arcId = video.archive_id || video.id;

        // 1. 아카이브 ID가 존재하고, 니코동 ID 패턴(sm, nm, so, am 등)일 때 (숫자ID만 추출)
        const arcNicoMatch = arcId ? String(arcId).match(/(sm|nm|so|am)\d+/) : null;
        if (arcNicoMatch) {
          const numId = arcNicoMatch[0].replace(/\D/g, ''); // 숫자(Digits)가 아닌 것(\D)을 제거
          return `https://nicovideo.cdn.nimg.jp/thumbnails/${numId}/${numId}`;
        }

        // 2. 아카이브 ID가 유튜브 ID 형식(11자리)인 경우
        if (arcId && arcId.length === 11) return `https://i.ytimg.com/vi/${arcId}/hqdefault.jpg`;

        // 3. 유튜브 오리지널 ID(yt_id 또는 오리지널 링크 내 유튜브 ID)가 존재하는 경우
        const ytOriginalId = video.yt_id || extractYtId(video.original_link);
        if (ytOriginalId) return `https://i.ytimg.com/vi/${ytOriginalId}/hqdefault.jpg`;

        // 4. [추가 수정] 유튜브 ID가 없고, 니코동 정보(nico_id 또는 original_link)만 있는 경우
        const nicoIdMatch = video.nico_id ? String(video.nico_id).match(/(sm|nm|so|am)?\d+/) : null;
        const originalNicoMatch = video.original_link ? video.original_link.match(/(sm|nm|so|am)\d+/) : null;
        
        // nico_id를 우선 확인하고, 없으면 original_link에서 추출합니다.
        const targetNicoId = (nicoIdMatch ? nicoIdMatch[0] : null) || (originalNicoMatch ? originalNicoMatch[0] : null);

        if (targetNicoId) {
          const numId = targetNicoId.replace(/\D/g, ''); // 'sm123456' -> '123456'으로 변환
          return `https://nicovideo.cdn.nimg.jp/thumbnails/${numId}/${numId}`;
        }

        // 5. 그 외의 경우 기본 대체 이미지 노출
        return 'https://via.placeholder.com/300x170?text=NO+IMAGE';
      };

      // 데이터 처리
      const getProcessedData = () => {
        const cmap = state.rawData.creatorMap || {};
        const pmap = state.rawData.profileMap || {};
        const archive = Array.isArray(state.rawData.videoData) ? state.rawData.videoData : [];
        const manual = Array.isArray(state.rawData.manualData) ? state.rawData.manualData : [];

        const resolveName = (n) => {
          if (!n) return "Unknown";
          let curr = n.trim();
          let visited = new Set();
          while (cmap[curr] && !visited.has(curr)) {
            visited.add(curr);
            curr = cmap[curr].trim();
          }
          return curr;
        };

        const getRefinedDate = (v) => {
          const d = String(v?.upload_date || "");
          const m = d.match(/(\d{4})[\/\.-](\d{2})[\/\.-](\d{2})/);
          if (m) return `${m[1]}/${m[2]}/${m[3]}`;
          const m2 = d.match(/^(\d{4})(\d{2})(\d{2})$/);
          if (m2) return `${m2[1]}/${m2[2]}/${m2[3]}`;
          return "0000/00/00";
        };

        const archiveVideos = [];
        const ytLookup = new Map();
        const nicoLookup = new Map();

        archive.forEach(group => {
          if (!group) return;
          const playlistYr = String(group.playlist_title || "Unknown").replace('年', '').replace('기타', 'UNKNOWN');

          if (Array.isArray(group.videos)) {
            group.videos.forEach(v => {
              if (!v) return;
              const mappedC = resolveName(v.creator);
              const refinedDate = getRefinedDate(v);

              const videoWithMeta = {
                ...v,
                mappedCreator: mappedC,
                refinedDate: refinedDate,
                targetYear: playlistYr
              };

              archiveVideos.push(videoWithMeta);

              const ytId = (v.yt_id && v.yt_id.length === 11) ? v.yt_id : extractYtId(v.original_link);
              if (ytId) ytLookup.set(ytId, videoWithMeta);

              if (v.nico_id) nicoLookup.set(v.nico_id, videoWithMeta);
              const nicoMatch = v.original_link ? v.original_link.match(/(sm|nm|so|am)\d+/) : null;
              if (nicoMatch) nicoLookup.set(nicoMatch[0], videoWithMeta);
            });
          }
        });

        const manualVideos = [];

        manual.forEach(v => {
          if (!v) return;

          const mappedC = resolveName(v.creator);
          const refinedDate = getRefinedDate(v);
          let yr = refinedDate.split('/')[0];
          if (yr === "0000") yr = "UNKNOWN";

          const ytId = (v.yt_id && v.yt_id.length === 11) ? v.yt_id : extractYtId(v.original_link);
          const nicoMatch = v.original_link ? v.original_link.match(/(sm|nm|so|am)\d+/) : null;
          const nicoId = v.nico_id || (nicoMatch ? nicoMatch[0] : null);

          let matchedVideo = null;
          if (ytId && ytLookup.has(ytId)) {
            matchedVideo = ytLookup.get(ytId);
          } else if (nicoId && nicoLookup.has(nicoId)) {
            matchedVideo = nicoLookup.get(nicoId);
          }

          if (matchedVideo) {
            if (v.title) matchedVideo.title = v.title;
            if (v.nico_id) matchedVideo.nico_id = v.nico_id;
            if (v.yt_id && v.yt_id.length === 11) matchedVideo.yt_id = v.yt_id;
            if (v.archive_id) matchedVideo.archive_id = v.archive_id;

            if (v.description) {
              matchedVideo.description = matchedVideo.description
                ? `${matchedVideo.description} / ${v.description}`
                : v.description;
            }

            if (v.is_viewable !== undefined) matchedVideo.is_viewable = v.is_viewable;

            if (refinedDate !== "0000/00/00") {
              matchedVideo.refinedDate = refinedDate;
              if (yr !== "UNKNOWN") matchedVideo.targetYear = yr;
            }

            Object.keys(v).forEach(key => {
              if (matchedVideo[key] === undefined) {
                matchedVideo[key] = v[key];
              }
            });
          } else {
            const newVideo = {
              ...v,
              mappedCreator: mappedC,
              refinedDate: refinedDate,
              targetYear: yr
            };
            manualVideos.push(newVideo);
          }
        });

        const allVideos = [...archiveVideos, ...manualVideos];

        if (state.lang === 'ko' && state.rawData.translationMap) {
          const sortedTranslations = Object.entries(state.rawData.translationMap)
            .sort((a, b) => b[0].length - a[0].length);

          allVideos.forEach(video => {
            if (video.title) {
              sortedTranslations.forEach(([original, translated]) => {
                if (video.title.includes(original)) {
                  video.title = video.title.split(original).join(translated);
                }
              });
            }
          });
        }

        let yearGroups = {};
        let creatorGroups = {};

        allVideos.forEach(videoWithMeta => {
          const yr = videoWithMeta.targetYear;
          const mappedC = videoWithMeta.mappedCreator;

          if (!yearGroups[yr]) yearGroups[yr] = [];
          yearGroups[yr].push(videoWithMeta);

          if (!creatorGroups[mappedC]) {
            creatorGroups[mappedC] = {
              videos: [],
              profile: pmap[mappedC] || pmap[videoWithMeta.creator] || DEFAULT_PROFILE
            };
          } else if (creatorGroups[mappedC].profile === DEFAULT_PROFILE && pmap[videoWithMeta.creator]) {
            creatorGroups[mappedC].profile = pmap[videoWithMeta.creator];
          }
          creatorGroups[mappedC].videos.push(videoWithMeta);
        });

        const sortGroups = (groups, type) => {
          let result = Object.keys(groups).map(k => {
            const videos = (type === 'creator' ? groups[k].videos : [...groups[k]]);
            const latestDate = videos.reduce((max, v) => (v.refinedDate > max ? v.refinedDate : max), "0000/00/00");
            return {
              playlist_title: k,
              videos: videos,
              profile: type === 'creator' ? groups[k].profile : null,
              latestDate: latestDate
            };
          });

          if (state.sortOrder === 'latest') result.sort((a, b) => b.latestDate.localeCompare(a.latestDate));
          else if (state.sortOrder === 'oldest') result.sort((a, b) => a.latestDate.localeCompare(b.latestDate));
          else if (state.sortOrder === 'name') result.sort((a, b) => a.playlist_title.localeCompare(b.playlist_title, state.lang));
          else if (state.sortOrder === 'random') {
            result.sort((a, b) => getRandomWeight(a.playlist_title) - getRandomWeight(b.playlist_title));
          }

          return result;
        };

        return {
          year: sortGroups(yearGroups, 'year'),
          creator: sortGroups(creatorGroups, 'creator'),
          all: allVideos
        };
      };

      // 렌더링 함수들
      const renderVideoItem = (v, index) => {
        const lang = state.lang;
        const currentI18n = i18n[lang];

        const nicoId = v.nico_id;
        const ytId = (v.yt_id && v.yt_id.length === 11) ? v.yt_id : extractYtId(v.original_link);

        let arcId = (v.archive_id && v.archive_id !== "") ? v.archive_id : (v.id || null);
        if (arcId === ytId) arcId = null;

        const arcNicoMatch = arcId ? String(arcId).match(/(sm|nm|so|am)\d+/) : null;
        const arcNicoId = arcNicoMatch ? arcNicoMatch[0] : null;
        const arcYtId = (!arcNicoId && arcId) ? arcId : null;

        const isViewable = v.is_viewable !== false;
        const isYtOriginalViewable = isViewable || (v.description || "").includes("視聴可能");

        let defaultSource = null;
        if (isViewable && nicoId) defaultSource = { type: 'nico', id: nicoId };
        else if (ytId && isYtOriginalViewable) defaultSource = { type: 'yt', id: ytId };
        else if (arcNicoId) defaultSource = { type: 'nico', id: arcNicoId };
        else if (arcYtId) defaultSource = { type: 'yt', id: arcYtId };
        else if (ytId) defaultSource = { type: 'yt', id: ytId };

        const thumb = getThumbnail(v);
        const videoKey = `${v.title}-${v.nico_id || index}`;
        const safeDOMId = `media-${index}`;
        const playerState = state.activePlayers[videoKey];

        const pmap = state.rawData.profileMap || {};
        const profileUrl = pmap[v.mappedCreator] || pmap[v.creator] || DEFAULT_PROFILE;

        const indicatorColor = isViewable
          ? 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,1)]'
          : 'bg-red-500 shadow-[0_0_12px_rgba(239,68,68,1)]';

        const indicatorTitle = isViewable ? currentI18n.viewable : currentI18n.notViewable;

        let mediaAreaHTML = '';
        if (playerState) {
          if (playerState.type === 'nico') {
            mediaAreaHTML = `
              <div class="w-full h-full relative">
                <iframe 
                  src="https://embed.nicovideo.jp/watch/${playerState.id}"
                  class="w-full h-full border-none"
                  allowfullscreen
                  allow="autoplay; encrypted-media"
                  title="Nico Player" 
                ></iframe>
                <div class="absolute top-2 right-2 flex gap-1">
                  <button 
                    onclick="app.openLink('https://www.nicovideo.jp/watch/${playerState.id}')"
                    class="bg-black/80 hover:bg-[#9b0000] text-white p-1.5 rounded-md text-[10px] flex items-center gap-1 transition-colors border border-white/20"
                  >
                    <i data-lucide="external-link" class="w-3 h-3"></i>
                    ${currentI18n.playFail}
                  </button>
                </div>
              </div>
            `;
          } else if (playerState.type === 'yt') {
            mediaAreaHTML = `
              <div class="w-full h-full relative">
                <iframe 
                  src="https://www.youtube.com/embed/${playerState.id}"
                  class="w-full h-full border-none"
                  allowfullscreen
                  allow="autoplay; encrypted-media"
                  title="YouTube Player" 
                ></iframe>
                <div class="absolute top-2 right-2 flex gap-1">
                  <button 
                    onclick="app.openLink('https://www.youtube.com/watch?v=${playerState.id}')"
                    class="bg-black/80 hover:bg-[#9b0000] text-white p-1.5 rounded-md text-[10px] flex items-center gap-1 transition-colors border border-white/20"
                  >
                    <i data-lucide="external-link" class="w-3 h-3"></i>
                    ${currentI18n.playFail}
                  </button>
                </div>
              </div>
            `;
          }
        } else {
          mediaAreaHTML = `
            <div 
              class="w-full h-full bg-center bg-cover flex items-center justify-center cursor-pointer relative"
              style="background-image: url('${thumb}')"
              data-type="${defaultSource?.type || ''}"
              data-id="${defaultSource?.id || ''}"
              data-videokey="${escapeHTML(videoKey)}"
              data-domid="${safeDOMId}"
              onclick="app.handleMediaClick(this.dataset.type, this.dataset.id, this.dataset.videokey, this.dataset.domid)"
            >
              <div class="z-10 w-14 h-14 bg-[#9b0000]/90 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 group-hover:scale-110 transition-all shadow-xl">
                <i data-lucide="play" class="w-7 h-7 text-white fill-white"></i>
              </div>
            </div>
            <div class="absolute left-3 bottom-3 w-2.5 h-2.5 rounded-full z-20 transition-all duration-300 ${indicatorColor}" title="${indicatorTitle}"></div>
          `;
        }

        let buttonsHTML = '';
        if (nicoId) {
          const btnClass = playerState?.type === 'nico' && playerState?.id === nicoId
            ? 'bg-[#9b0000] border-[#9b0000] text-white'
            : 'bg-[#1a1a1a] border-[#333] text-[#888] hover:border-[#9b0000]';
          buttonsHTML += `
            <button 
              data-videokey="${escapeHTML(videoKey)}"
              data-nicoid="${nicoId}"
              data-domid="${safeDOMId}"
              onclick="app.playVideo(this.dataset.videokey, 'nico', this.dataset.nicoid, this.dataset.domid)"
              id="btn-nico-${safeDOMId}"
              class="px-3 py-1 text-[10px] font-bold border transition-colors ${btnClass}"
            >
              NICO ${isViewable ? '✔' : '✖'}
            </button>
          `;
        }
        if (ytId) {
          const isActive = playerState?.type === 'yt' && playerState?.id === ytId;
          const btnClass = isActive
            ? 'bg-[#9b0000] border-[#9b0000] text-white'
            : (isYtOriginalViewable
              ? 'bg-[#1a1a1a] border-[#333] text-[#888] hover:border-[#9b0000]'
              : 'bg-[#1a1a1a] border-[#9b0000]/30 text-[#555] line-through');
          buttonsHTML += `
            <button 
              data-videokey="${escapeHTML(videoKey)}"
              data-ytid="${ytId}"
              data-domid="${safeDOMId}"
              onclick="app.playVideo(this.dataset.videokey, 'yt', this.dataset.ytid, this.dataset.domid)"
              id="btn-yt-${safeDOMId}"
              class="px-3 py-1 text-[10px] font-bold border transition-colors ${btnClass}"
            >
              YT ${isYtOriginalViewable ? '✔' : '✖'}
            </button>
          `;
        }
        if (arcId) {
          if (arcNicoId) {
            const btnClass = playerState?.type === 'nico' && playerState?.id === arcNicoId
              ? 'bg-[#9b0000] border-[#9b0000] text-white'
              : 'bg-[#1a1a1a] border-[#333] text-[#888] hover:border-[#9b0000]';
            buttonsHTML += `
              <button 
                data-videokey="${escapeHTML(videoKey)}"
                data-nicoid="${arcNicoId}"
                data-domid="${safeDOMId}"
                onclick="app.playVideo(this.dataset.videokey, 'nico', this.dataset.nicoid, this.dataset.domid)"
                id="btn-arc-${safeDOMId}"
                class="px-3 py-1 text-[10px] font-bold border transition-colors ${btnClass}"
              >
                ARCHIVE (NICO)
              </button>
            `;
          } else {
            const isActive = playerState?.type === 'yt' && playerState?.id === arcYtId;
            const btnClass = isActive
              ? 'bg-[#9b0000] border-[#9b0000] text-white'
              : 'bg-[#1a1a1a] border-[#333] text-[#888] hover:border-[#9b0000]';
            buttonsHTML += `
              <button 
                data-videokey="${escapeHTML(videoKey)}"
                data-ytid="${arcYtId}"
                data-domid="${safeDOMId}"
                onclick="app.playVideo(this.dataset.videokey, 'yt', this.dataset.ytid, this.dataset.domid)"
                id="btn-arc-${safeDOMId}"
                class="px-3 py-1 text-[10px] font-bold border transition-colors ${btnClass}"
              >
                ARCHIVE
              </button>
            `;
          }
        }

        if (v.tvple_id && v.tvple_id !== "") {
          buttonsHTML += `
            <button 
              onclick="app.openLink('https://tvple.com/${v.tvple_id}')"
              class="px-3 py-1 text-[10px] font-bold border transition-colors bg-[#1a1a1a] border-[#333] text-[#888] hover:border-[#9b0000]"
            >
              TVPLE
            </button>
          `;
        }

        if (v.archive_nico_id && v.archive_nico_id !== "") {
          buttonsHTML += `
            <button 
              onclick="app.openLink('https://www.nicovideo.jp/watch/${v.archive_nico_id}')"
              class="px-3 py-1 text-[10px] font-bold border transition-colors bg-[#1a1a1a] border-[#333] text-[#888] hover:border-[#9b0000]"
            >
              NICO ARCHIVE
            </button>
          `;
        }

        // [수정 적용] 프로필 썸네일 박스 및 닉네임 span 태그에 모달 트리거 바인딩 및 호버 효과 연동
        return `
          <div class="bg-[#121212] border border-[#222] flex flex-col overflow-hidden shadow-lg transition-all hover:border-[#444] relative h-full fade-in">
            <div class="aspect-video bg-black relative group overflow-hidden" id="${safeDOMId}">
              ${mediaAreaHTML}
            </div>
            <div class="p-4 flex-grow flex flex-col relative">
              <h5 class="text-lg font-bold text-[#f0f0f0] line-clamp-2 h-18 leading-snug">${escapeHTML(v.title)}</h5>
              
              <div class="text-[11px] text-[#888] mt-2 flex items-center gap-2 font-sans">
                <div class="w-10 h-10 rounded-full overflow-hidden border border-[#9b0000]/40 shrink-0 bg-[#0a0a0a] cursor-pointer hover:scale-105 transition-transform"
                     data-creator="${escapeHTML(v.mappedCreator)}" onclick="app.openCreatorModal(this.dataset.creator)">
                  <img src="${profileUrl}" class="w-full h-full object-cover" onerror="this.src='${DEFAULT_PROFILE}'" />
                </div>
                <span class="text-[#9b0000] font-bold cursor-pointer hover:underline"
                      data-creator="${escapeHTML(v.mappedCreator)}" onclick="app.openCreatorModal(this.dataset.creator)">
                  ${escapeHTML(v.mappedCreator)}
                </span>
                <span class="opacity-30">|</span>
                <span>${escapeHTML(v.refinedDate)}</span>
              </div>
              
              <div class="flex flex-wrap gap-2 mt-auto pt-4">
                ${buttonsHTML}
              </div>
            </div>
          </div>
        `;
      };

      const updateUI = () => {
        const main = document.getElementById('main-content');
        const lang = state.lang;
        const currentI18n = i18n[lang];

        document.documentElement.lang = lang;

        const btnKo = document.getElementById('btn-lang-ko');
        const btnJa = document.getElementById('btn-lang-ja');
        if (btnKo && btnJa) {
          if (lang === 'ko') {
            btnKo.className = "px-2.5 py-1 text-xs font-bold rounded transition-all bg-[#9b0000] text-white";
            btnJa.className = "px-2.5 py-1 text-xs font-bold rounded transition-all text-[#777] hover:text-[#aaa]";
          } else {
            btnKo.className = "px-2.5 py-1 text-xs font-bold rounded transition-all text-[#777] hover:text-[#aaa]";
            btnJa.className = "px-2.5 py-1 text-xs font-bold rounded transition-all bg-[#9b0000] text-white";
          }
        }

        const searchInput = document.getElementById('search-input');
        if (searchInput) {
          searchInput.placeholder = currentI18n.searchPlaceholder;
        }

        const sortSelect = document.getElementById('sort-select');
        if (sortSelect) {
          sortSelect.innerHTML = `
            <option value="latest" class="bg-[#1a1a1a]" ${state.sortOrder === 'latest' ? 'selected' : ''}>${currentI18n.sortLatest}</option>
            <option value="oldest" class="bg-[#1a1a1a]" ${state.sortOrder === 'oldest' ? 'selected' : ''}>${currentI18n.sortOldest}</option>
            <option value="random" class="bg-[#1a1a1a]" ${state.sortOrder === 'random' ? 'selected' : ''}>${currentI18n.sortRandom}</option>
            <option value="name" class="bg-[#1a1a1a]" ${state.sortOrder === 'name' ? 'selected' : ''}>${currentI18n.sortName}</option>
          `;
        }

        const btnYear = document.getElementById('btn-year');
        const btnCreator = document.getElementById('btn-creator');
        const btnAll = document.getElementById('btn-all');
        if (btnYear && btnCreator && btnAll) {
          btnYear.textContent = currentI18n.viewYear;
          btnCreator.textContent = currentI18n.viewCreator;
          btnAll.textContent = currentI18n.viewAll;

          btnYear.className = `px-4 md:px-5 py-1.5 text-xs md:text-sm font-bold rounded transition-all ${state.viewMode === 'year' ? 'bg-[#9b0000] text-white' : 'text-[#777] hover:text-[#aaa]'}`;
          btnCreator.className = `px-4 md:px-5 py-1.5 text-xs md:text-sm font-bold rounded transition-all ${state.viewMode === 'creator' ? 'bg-[#9b0000] text-white' : 'text-[#777] hover:text-[#aaa]'}`;
          btnAll.className = `px-4 md:px-5 py-1.5 text-xs md:text-sm font-bold rounded transition-all ${state.viewMode === 'all' ? 'bg-[#9b0000] text-white' : 'text-[#777] hover:text-[#aaa]'}`;
        }

        const reloadIcon = document.getElementById('reload-icon');
        if (state.loading) {
          reloadIcon.classList.add('animate-spin');
          main.innerHTML = `
            <div class="flex flex-col items-center justify-center py-40 opacity-50 font-sans tracking-widest text-xs">
              <div class="w-12 h-12 border-4 border-t-[#9b0000] border-[#1a1a1a] rounded-full animate-spin mb-4"></div>
              ${currentI18n.loading}
            </div>
          `;
          return;
        } else {
          reloadIcon.classList.remove('animate-spin');
        }

        const processedData = getProcessedData();

        if (state.selectedPlaylist || state.viewMode === 'all') {
          let videos = state.selectedPlaylist ? [...state.selectedPlaylist.videos] : [...processedData.all];

          if (state.viewMode === 'all' && state.searchQuery) {
            const q = state.searchQuery;
            videos = videos.filter(v => matchSearch(v.title, q) || matchSearch(v.mappedCreator, q));
          }

          if (state.sortOrder === 'latest') videos.sort((a, b) => b.refinedDate.localeCompare(a.refinedDate));
          else if (state.sortOrder === 'oldest') videos.sort((a, b) => a.refinedDate.localeCompare(b.refinedDate));
          else if (state.sortOrder === 'name') videos.sort((a, b) => a.title.localeCompare(b.title, state.lang));
          else if (state.sortOrder === 'random') {
            videos.sort((a, b) => {
              const keyA = `${a.title}-${a.nico_id || a.yt_id || ''}`;
              const keyB = `${b.title}-${b.nico_id || b.yt_id || ''}`;
              return getRandomWeight(keyA) - getRandomWeight(keyB);
            });
          }

          let sortLabel = "";
          if (state.sortOrder === 'latest') sortLabel = currentI18n.sortLatest;
          else if (state.sortOrder === 'oldest') sortLabel = currentI18n.sortOldest;
          else if (state.sortOrder === 'name') sortLabel = currentI18n.sortName;
          else if (state.sortOrder === 'random') sortLabel = currentI18n.sortRandom;

          let displayPlaylistTitle = state.selectedPlaylist ? state.selectedPlaylist.playlist_title : currentI18n.viewAll;
          if (state.selectedPlaylist && state.viewMode === 'year' && displayPlaylistTitle === 'UNKNOWN') {
            displayPlaylistTitle = lang === 'ko' ? '기타 / 미분류' : 'その他 / 未分類';
          }

          main.innerHTML = `
            <div class="fade-in duration-500">
              <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4">
                  ${state.selectedPlaylist ? `
                  <button onclick="app.clearPlaylist()" class="p-2 bg-[#1a1a1a] border border-[#333] hover:border-[#9b0000] transition-colors rounded" title="${currentI18n.back}">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                  </button>
                  ` : ''}
                  <div>
                    <h2 class="text-2xl font-bold text-[#9b0000] uppercase italic tracking-tight">${escapeHTML(displayPlaylistTitle)}</h2>
                    <p class="text-[10px] text-[#555] font-sans mt-0.5 uppercase tracking-widest">
                      ${sortLabel} ${currentI18n.sortedBy} (${videos.length}${currentI18n.works})
                    </p>
                  </div>
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                ${videos.map((v, i) => renderVideoItem(v, i)).join('')}
              </div>
            </div>
          `;
        } else {
          const data = processedData[state.viewMode] || [];
          const q = state.searchQuery;

          const filteredData = q
            ? data.filter(p =>
              matchSearch(p.playlist_title, q) ||
              p.videos.some(v => matchSearch(v.title, q) || matchSearch(v.mappedCreator, q))
            )
            : data;

          let gridHTML = filteredData.map((p, idx) => {
            const mainThumb = getThumbnail(p.videos[0]);
            const profileHTML = (state.viewMode === 'creator' && p.profile)
              ? `<div class="absolute top-2 left-2 w-10 h-10 border-2 border-[#9b0000] rounded-full overflow-hidden shadow-2xl z-10 transform group-hover:scale-110 transition-transform bg-[#0a0a0a]">
                   <img src="${p.profile}" class="w-full h-full object-cover" onerror="this.src='${DEFAULT_PROFILE}'" />
                 </div>`
              : '';

            let displayFolderTitle = p.playlist_title;
            if (state.viewMode === 'year' && displayFolderTitle === 'UNKNOWN') {
              displayFolderTitle = lang === 'ko' ? '기타 / 미분류' : 'その他 / 未分類';
            }

            return `
              <div class="bg-[#121212] border border-[#222] hover:border-[#9b0000] cursor-pointer group transition-all rounded overflow-hidden flex flex-col fade-in" 
                   data-title="${escapeHTML(p.playlist_title)}" 
                   onclick="app.selectPlaylist(this.dataset.title)">
                <div class="aspect-video bg-black overflow-hidden relative">
                  <img src="${mainThumb}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-300" onerror="this.src='https://via.placeholder.com/300x170?text=ARCHIVE'" />
                  ${profileHTML}
                </div>
                <div class="p-3 bg-[#121212] flex-grow">
                  <h4 class="text-sm font-bold truncate group-hover:text-[#9b0000] transition-colors">${escapeHTML(displayFolderTitle)}</h4>
                  <p class="text-[10px] text-[#555] mt-1 font-bold uppercase tracking-widest">${p.videos?.length || 0} ${currentI18n.works}</p>
                </div>
              </div>
            `;
          }).join('');

          main.innerHTML = `
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 fade-in duration-700">
              ${gridHTML}
            </div>
          `;
        }

        lucide.createIcons();
      };

      // API 노출
      return {
        init: async () => {
          try {
            const savedLang = localStorage.getItem('dna_lang');
            if (savedLang === 'ko' || savedLang === 'ja') {
              state.lang = savedLang;
            }
          } catch (e) {
            console.warn("로컬 스토리지 로드 실패:", e);
          }
          lucide.createIcons();
          await app.fetchData();
        },
        fetchData: async () => {
          state.loading = true;
          updateUI();

          const videoDataUrl = "https://raw.githubusercontent.com/lsaac55151/dethno/refs/heads/main/video_data.json";
          const manualDataUrl = "https://raw.githubusercontent.com/lsaac55151/dethno/refs/heads/main/manual_data.json";
          const creatorMapUrl = "https://raw.githubusercontent.com/lsaac55151/dethno/refs/heads/main/creator_map.json";
          const profileMapUrl = "https://raw.githubusercontent.com/lsaac55151/dethno/refs/heads/main/profile_map.json";
          const translationUrl = "https://raw.githubusercontent.com/lsaac55151/dethno/refs/heads/main/%EB%B2%88%EC%97%AD%EC%9A%A9.txt";

          try {
            const [resVideo, resManual, resCreator, resProfile, resTranslation] = await Promise.all([
              fetch(videoDataUrl),
              fetch(manualDataUrl),
              fetch(creatorMapUrl),
              fetch(profileMapUrl),
              fetch(translationUrl)
            ]);

            if (!resVideo.ok || !resManual.ok || !resCreator.ok || !resProfile.ok || !resTranslation.ok) {
              throw new Error("GitHub에서 데이터를 가져오는 중 오류가 발생했습니다.");
            }

            const translationText = await resTranslation.text();
            const translationMap = {};
            translationText.split('\n').forEach(line => {
              const trimmed = line.trim();
              if (!trimmed || trimmed.startsWith('#')) return;

              const delimiterIndex = trimmed.lastIndexOf('==');

              if (delimiterIndex !== -1) {
                const key = trimmed.substring(0, delimiterIndex).trim();
                const value = trimmed.substring(delimiterIndex + 2).trim();

                if (key) translationMap[key] = value;
              }
            });

            state.rawData = {
              videoData: await resVideo.json(),
              manualData: await resManual.json(),
              creatorMap: await resCreator.json(),
              profileMap: await resProfile.json(),
              translationMap: translationMap
            };
          } catch (error) {
            console.error("데이터 로드 실패:", error);
          } finally {
            setTimeout(() => {
              state.loading = false;

              try {
                const saved = sessionStorage.getItem('dna_state');
                if (saved) {
                  const parsed = JSON.parse(saved);
                  state.viewMode = parsed.viewMode || 'year';
                  state.sortOrder = parsed.sortOrder || 'latest';
                  state.searchQuery = parsed.searchQuery || '';
                  state.mainScrollPosition = parsed.mainScrollPosition || 0;

                  if (parsed.selectedPlaylistTitle) {
                    const processed = getProcessedData();
                    const data = processed[state.viewMode] || [];
                    state.selectedPlaylist = data.find(p => p.playlist_title === parsed.selectedPlaylistTitle) || null;
                  }

                  updateUI();

                  if (parsed.scrollPosition) {
                    window.scrollTo(0, parsed.scrollPosition);
                  }

                  sessionStorage.removeItem('dna_state');
                  return;
                }
              } catch (e) {
                console.warn("세션 복원 실패:", e);
              }

              updateUI();
            }, 300);
          }
        },
        setViewMode: (mode) => {
          if (state.selectedPlaylist) state.selectedPlaylist = null;
          state.viewMode = mode;
          state.mainScrollPosition = 0;
          window.scrollTo(0, 0);
          updateUI();
        },
        setSearchQuery: (query) => {
          if (state.selectedPlaylist && query !== "") state.selectedPlaylist = null;
          state.searchQuery = query;
          updateUI();
        },
        setSortOrder: (order) => {
          if (order === 'random') {
            state.randomWeights = {};
          }
          state.sortOrder = order;
          updateUI();
        },
        setLanguage: (lang) => {
          if (lang === 'ko' || lang === 'ja') {
            state.lang = lang;
            try {
              localStorage.setItem('dna_lang', lang);
            } catch (e) {
              console.warn("로컬 스토리지 저장 실패:", e);
            }
            updateUI();
          }
        },
        goHome: () => {
          state.selectedPlaylist = null;
          state.viewMode = 'year';
          state.mainScrollPosition = 0;
          try { sessionStorage.removeItem('dna_state'); } catch (e) { }
          window.scrollTo(0, 0);
          updateUI();
        },
        selectPlaylist: (title) => {
          state.mainScrollPosition = window.scrollY;

          const processedData = getProcessedData();
          const data = processedData[state.viewMode] || [];

          state.selectedPlaylist = data.find(p => p.playlist_title === title) || null;
          window.scrollTo(0, 0);
          updateUI();
        },
        clearPlaylist: () => {
          state.selectedPlaylist = null;
          updateUI();
          setTimeout(() => {
            window.scrollTo(0, state.mainScrollPosition);
          }, 0);
        },
        openLink: (url) => {
          try {
            const sessionState = {
              viewMode: state.viewMode,
              selectedPlaylistTitle: state.selectedPlaylist ? state.selectedPlaylist.playlist_title : null,
              scrollPosition: window.scrollY,
              mainScrollPosition: state.mainScrollPosition,
              sortOrder: state.sortOrder,
              searchQuery: state.searchQuery,
              lang: state.lang
            };
            sessionStorage.setItem('dna_state', JSON.stringify(sessionState));
          } catch (e) {
            console.warn("세션 저장 실패:", e);
          }
          window.open(url, '_blank');
        },
        playVideo: (videoKey, type, id, domId) => {
          state.activePlayers = { ...state.activePlayers, [videoKey]: { type, id } };
          const lang = state.lang;
          const currentI18n = i18n[lang];

          if (domId) {
            const container = document.getElementById(domId);
            if (container) {
              if (type === 'nico') {
                container.innerHTML = `
                  <div class="w-full h-full relative">
                    <iframe 
                      src="https://embed.nicovideo.jp/watch/${id}"
                      class="w-full h-full border-none"
                      allowfullscreen
                      allow="autoplay; encrypted-media"
                      title="Nico Player" 
                    ></iframe>
                    <div class="absolute top-2 right-2 flex gap-1">
                      <button 
                        onclick="app.openLink('https://www.nicovideo.jp/watch/${id}')"
                        class="bg-black/80 hover:bg-[#9b0000] text-white p-1.5 rounded-md text-[10px] flex items-center gap-1 transition-colors border border-white/20"
                      >
                        <i data-lucide="external-link" class="w-3 h-3"></i>
                        ${currentI18n.playFail}
                      </button>
                    </div>
                  </div>
                `;
                lucide.createIcons();
              } else if (type === 'yt') {
                container.innerHTML = `
                  <div class="w-full h-full relative">
                    <iframe 
                      src="https://www.youtube.com/embed/${id}"
                      class="w-full h-full border-none"
                      allowfullscreen
                      allow="autoplay; encrypted-media"
                      title="YouTube Player" 
                    ></iframe>
                    <div class="absolute top-2 right-2 flex gap-1">
                      <button 
                        onclick="app.openLink('https://www.youtube.com/watch?v=${id}')"
                        class="bg-black/80 hover:bg-[#9b0000] text-white p-1.5 rounded-md text-[10px] flex items-center gap-1 transition-colors border border-white/20"
                      >
                        <i data-lucide="external-link" class="w-3 h-3"></i>
                        ${currentI18n.playFail}
                      </button>
                    </div>
                  </div>
                `;
                lucide.createIcons();
              }
            }

            const btnNico = document.getElementById(`btn-nico-${domId}`);
            const btnYt = document.getElementById(`btn-yt-${domId}`);
            const btnArc = document.getElementById(`btn-arc-${domId}`);

            const setActive = (btn) => {
              if (!btn) return;
              btn.className = btn.className
                .replace('bg-[#1a1a1a]', 'bg-[#9b0000]')
                .replace('border-[#333]', 'border-[#9b0000]')
                .replace('text-[#888]', 'text-white')
                .replace('hover:border-[#9b0000]', '');
            };

            const setInactive = (btn) => {
              if (!btn) return;
              btn.className = btn.className
                .replace('bg-[#9b0000]', 'bg-[#1a1a1a]')
                .replace('border-[#9b0000]', 'border-[#333]')
                .replace('text-white', 'text-[#888]')
                + ' hover:border-[#9b0000]';
            };

            if (type === 'nico') {
              if (btnNico) {
                if (btnNico.dataset.nicoid === id) setActive(btnNico);
                else setInactive(btnNico);
              }
              if (btnYt) setInactive(btnYt);
              if (btnArc) {
                if (btnArc.dataset.nicoid === id) setActive(btnArc);
                else setInactive(btnArc);
              }
            } else if (type === 'yt') {
              if (btnNico) setInactive(btnNico);
              if (btnYt) {
                if (btnYt.dataset.ytid === id) setActive(btnYt);
                else setInactive(btnYt);
              }
              if (btnArc) {
                if (btnArc.dataset.ytid === id) setActive(btnArc);
                else setInactive(btnArc);
              }
            }
          } else {
            updateUI();
          }
        },
        handleMediaClick: (type, id, videoKey, domId) => {
          if (type === 'yt') app.playVideo(videoKey, 'yt', id, domId);
          else if (type === 'nico') app.playVideo(videoKey, 'nico', id, domId);
        },

        // [추가 구현] 제작자 모달 열기 팝업 구현
        openCreatorModal: (creatorName) => {
          const processedData = getProcessedData();
          // 정제된 데이터 내에서 클릭된 크리에이터 그룹 정보 매칭
          const creatorData = processedData.creator.find(c => c.playlist_title === creatorName);
          if (!creatorData) return;

          const modal = document.getElementById('creator-modal');
          const modalName = document.getElementById('modal-creator-name');
          const modalProfile = document.getElementById('modal-creator-profile');
          const modalCount = document.getElementById('modal-creator-count');
          const modalWorks = document.getElementById('modal-creator-works');

          // 모달 상단 정보 바인딩
          modalName.textContent = creatorName;
          modalProfile.src = creatorData.profile || DEFAULT_PROFILE;
          modalProfile.onerror = () => { modalProfile.src = DEFAULT_PROFILE; };
          
          const lang = state.lang;
          const currentI18n = i18n[lang];
          modalCount.textContent = `${creatorData.videos.length}${currentI18n.works}`;

          // 모달 안의 비디오 카드들도 현재 사이트의 전체 정렬 필터(최신순/오래된순 등)를 동일하게 추종하도록 처리
          let modalVideos = [...creatorData.videos];
          if (state.sortOrder === 'latest') modalVideos.sort((a, b) => b.refinedDate.localeCompare(a.refinedDate));
          else if (state.sortOrder === 'oldest') modalVideos.sort((a, b) => a.refinedDate.localeCompare(b.refinedDate));
          else if (state.sortOrder === 'name') modalVideos.sort((a, b) => a.title.localeCompare(b.title, state.lang));
          else if (state.sortOrder === 'random') {
            modalVideos.sort((a, b) => {
              const keyA = `modal-${a.title}-${a.nico_id || a.yt_id || ''}`;
              const keyB = `modal-${b.title}-${b.nico_id || b.yt_id || ''}`;
              return getRandomWeight(keyA) - getRandomWeight(keyB);
            });
          }

          // 메인 그리드 비디오들과의 DOM ID 충돌 방지를 위해 인덱스 접두어 고유값 처리 (`modal-${i}`)
          modalWorks.innerHTML = modalVideos.map((v, i) => renderVideoItem(v, `modal-${i}`)).join('');

          // 모달 노출
          modal.classList.remove('hidden');
          modal.classList.add('flex');
          
          // 모달 안에 박힌 X 아이콘과 재생 아이콘을 Lucide로 초기화 적용
          lucide.createIcons();
        },

        // [추가 구현] 제작자 모달 닫기 및 사운드 오프 처리
        closeCreatorModal: () => {
          const modal = document.getElementById('creator-modal');
          modal.classList.remove('flex');
          modal.classList.add('hidden');
          // 모달을 닫을 때 백그라운드 재생 중이던 iframe 사운드가 완전히 꺼지도록 innerHTML을 제거해 리셋
          document.getElementById('modal-creator-works').innerHTML = '';
        }
      };
    })();

    document.addEventListener('DOMContentLoaded', app.init);
  </script>
</body>

</html>
